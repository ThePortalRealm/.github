name: 🔍 Resolve .NET Publish Project
description: Resolve a single .csproj to publish, honoring .github/dotnet-publish-project.txt and ignoring *Tests.csproj.

inputs:
  default_pattern:
    description: "Fallback glob for project resolution if no config file is present"
    required: false
    default: "*.csproj"

outputs:
  project:
    description: "Resolved .csproj path for publish"
    value: ${{ steps.resolve.outputs.project }}

runs:
  using: "composite"
  steps:
    - id: resolve
      shell: bash
      run: |
        pattern='${{ inputs.default_pattern }}'

        # 1) Config override: .github/dotnet-publish-project.txt
        if [ -f ".github/dotnet-publish-project.txt" ]; then
          echo "Found .github/dotnet-publish-project.txt, using that."
          project=$(<.github/dotnet-publish-project.txt)

          # Trim CRLF/whitespace
          project="$(echo "$project" | tr -d '\r' | xargs)"

          if [ -z "$project" ]; then
            echo "❌ .github/dotnet-publish-project.txt is empty."
            exit 1
          fi

          if [ ! -f "$project" ]; then
            echo "❌ Project from .github/dotnet-publish-project.txt does not exist: $project"
            exit 1
          fi

          echo "Resolved project (config): $project"
          echo "project=$project" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No .github/dotnet-publish-project.txt found. Auto-detecting project..."

        # 2) Auto-detect: all .csproj files, excluding test projects
        mapfile -t all < <(find . -name '*.csproj' -print | sort || true)

        if [ "${#all[@]}" -eq 0 ]; then
          echo "❌ No .csproj files found in repo."
          exit 1
        fi

        echo "Found ${#all[@]} .csproj file(s):"
        printf '  %s\n' "${all[@]}"

        non_test=()
        for p in "${all[@]}"; do
          filename=$(basename "$p")
          if [[ "$filename" == *.Tests.csproj ]]; then
            echo "Skipping test project: $p"
            continue
          fi
          non_test+=("$p")
        done

        if [ "${#non_test[@]}" -eq 0 ]; then
          echo "❌ All .csproj files look like test projects (*.Tests.csproj)."
          echo "   Add .github/dotnet-publish-project.txt to specify the main project."
          exit 1
        fi

        if [ "${#non_test[@]}" -gt 1 ]; then
          echo "❌ Multiple non-test .csproj files detected:"
          printf '  %s\n' "${non_test[@]}"
          echo "   Add .github/dotnet-publish-project.txt to specify the main project."
          exit 1
        fi

        project="${non_test[0]}"
        echo "Using detected project: $project"
        echo "project=$project" >> "$GITHUB_OUTPUT"
