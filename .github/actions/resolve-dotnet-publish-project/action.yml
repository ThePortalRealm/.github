name: 🔍 Resolve .NET Publish Project
description: Resolve a single .csproj to publish, honoring .github/dotnet-publish-project.txt and ignoring *Tests.csproj.

inputs:
  default_pattern:
    description: "Fallback glob for project resolution if no config file is present"
    required: false
    default: "*.csproj"

outputs:
  project:
    description: "Resolved .csproj path for publish"
    value: ${{ steps.resolve.outputs.project }}

runs:
  using: "composite"
  steps:
    - id: resolve
      shell: bash
      run: |
        pattern='${{ inputs.default_pattern }}'

        # 1) Config override: .github/dotnet-publish-project.txt
        if [ -f ".github/dotnet-publish-project.txt" ]; then
          echo "Found .github/dotnet-publish-project.txt, using that."
          project=$(<.github/dotnet-publish-project.txt)

          # Trim CRLF/whitespace
          project="$(echo "$project" | tr -d '\r' | xargs)"

          if [ -z "$project" ]; then
            echo "❌ .github/dotnet-publish-project.txt is empty."
            exit 1
          fi

          # First, try as a direct path
          if [ ! -f "$project" ]; then
            # Fall back to treating it as a file name
            name="$(basename "$project")"
            echo "Config path '$project' not found; searching by filename '$name'..."
            match=$(find . -name "$name" -print | head -n 1)

            if [ -z "$match" ]; then
              echo "❌ Project from .github/dotnet-publish-project.txt does not exist: $project"
              exit 1
            fi

            project="$match"
          fi

          echo "Resolved project (config): $project"
          echo "project=$project" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No .github/dotnet-publish-project.txt found. Auto-detecting project..."
        # ... rest of your existing auto-detect logic ...
