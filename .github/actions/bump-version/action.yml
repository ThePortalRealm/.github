name: 🔢 Bump Version
description: Determines next semantic version.

inputs:
  bump:
    description: "Version bump type (major, minor, patch)"
    default: "patch"

outputs:
  version:
    value: ${{ steps.bump.outputs.version }}

runs:
  using: "composite"
  steps:
    - id: bump
      shell: bash
      run: .github/scripts/bump-version.sh
