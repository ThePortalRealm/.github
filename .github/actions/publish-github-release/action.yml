name: 🏷️ Tag and Publish GitHub Release
description: Creates a git tag and GitHub release for any build output.

inputs:
  version:
    description: "Version string (e.g. 1.2.3)"
    required: true
  gh-token:
    description: "GitHub token for pushing and creating releases"
    required: true
  files:
    description: "Path to artifact(s) to attach (e.g. artifacts/*.nupkg)"
    required: true
  title:
    description: "Release title"
    default: "📦 Release"
  keep-latest:
    description: "Number of releases to keep when cleaning up old ones"
    default: "100"

runs:
  using: "composite"
  steps:
    - name: 🏷️ Create Git Tag
      shell: bash
      run: |
        TAG="v${{ inputs.version }}"
        echo "🏷️ Creating tag: $TAG"
        git tag -a "$TAG" -m "Release $TAG"
        git push origin "$TAG"
        echo "✅ Tagged: $TAG"

    - name: 🚀 Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ inputs.version }}"
        name: "${{ inputs.title }} v${{ inputs.version }}"
        files: ${{ inputs.files }}
      env:
        GITHUB_TOKEN: ${{ inputs.gh-token }}

    - name: 🧹 Clean up older releases
      uses: dev-drprasad/delete-older-releases@v0.3.3
      with:
        keep_latest: ${{ inputs.keep-latest }}
        delete_tags: false
      env:
        GITHUB_TOKEN: ${{ inputs.gh-token }}
