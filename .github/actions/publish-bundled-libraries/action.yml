name: 📦 Publish Bundled Libraries
description: Bundles latest .nupkg assets from submodules, zips them, and publishes a release only if bundle contents changed.

inputs:
  bump:
    description: "Version bump type (major, minor, patch)"
    default: "patch"
  gh-token:
    required: true

runs:
  using: "composite"
  steps:
    # ------------------------------------------------------------
    # ♻️ Restore cached hash from previous run
    # ------------------------------------------------------------
    - name: ♻️ Restore bundle hash
      id: restore-hash
      uses: actions/cache@v4
      with:
        path: .bundle-hash
        key: bundle-hash-${{ github.ref_name }}

    # ------------------------------------------------------------
    # 📦 Bundle library releases
    # ------------------------------------------------------------
    - name: 📦 Bundle Library Releases
      id: bundle
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail

        echo
        echo "Bundling latest release packages from all submodules..."
        echo

        # --- Validate prerequisites ---
        command -v jq >/dev/null 2>&1 || { echo "❌ jq not installed"; exit 1; }
        command -v curl >/dev/null 2>&1 || { echo "❌ curl not installed"; exit 1; }
        command -v zip  >/dev/null 2>&1 || { echo "❌ zip not installed"; exit 1; }

        ORG="LostMinions"
        OUTPUT_DIR="artifacts"
        mkdir -p "$OUTPUT_DIR"

        mapfile -t SUBMODULES < <(git config --file .gitmodules --get-regexp path | awk '{ print $2 }' | sort)

        if [[ ${#SUBMODULES[@]} -eq 0 ]]; then
          echo "No submodules found in .gitmodules"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        for module_path in "${SUBMODULES[@]}"; do
          name=$(basename "$module_path")
          repo="$ORG/$name"

          echo "------------------------------------------------------------"
          echo " $repo"
          echo "------------------------------------------------------------"

          release_json=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                              -H "Accept: application/vnd.github+json" \
                              "https://api.github.com/repos/$repo/releases/latest")

          if [[ $(echo "$release_json" | jq -r '.message // empty') == "Not Found" ]]; then
            echo "No releases found for $repo"
            continue
          fi

          tag=$(echo "$release_json" | jq -r '.tag_name // empty')
          echo "Latest tag: $tag"

          asset_data=$(echo "$release_json" | jq -c '.assets[]? | select(.name | endswith(".nupkg"))')
          if [[ -z "$asset_data" ]]; then
            echo "No .nupkg assets for $repo@$tag"
            continue
          fi

          echo "Downloading assets..."
          echo

          while read -r asset; do
            asset_name=$(echo "$asset" | jq -r '.name')
            asset_url=$(echo "$asset" | jq -r '.url')
            outfile="$OUTPUT_DIR/$asset_name"

            printf -- "- * %-45s" "$asset_name"
            if curl -sSL --fail \
                 -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/octet-stream" \
                 -o "$outfile" \
                 "$asset_url"; then
              size=$(du -h "$outfile" | cut -f1)
              printf -- "- (%s)\n" "$size"
            else
              printf -- "- (failed)\n"
            fi
          done <<< "$asset_data"

          echo
        done

        echo "------------------------------------------------------------"
        echo "Final bundled packages:"
        ls -lh "$OUTPUT_DIR" | awk 'NR>1 {print "   "$0}'
        echo "------------------------------------------------------------"

        # --- Compute hash ---
        NEW_HASH=$(find "$OUTPUT_DIR" -type f -exec sha256sum {} + | sort | sha256sum | awk '{print $1}')
        echo "hash=$NEW_HASH" >> "$GITHUB_OUTPUT"

        HASH_FILE=".bundle-hash"
        OLD_HASH=""
        if [ -f "$HASH_FILE" ]; then
          OLD_HASH=$(cat "$HASH_FILE")
          echo "Previous hash: $OLD_HASH"
        fi

        if [ "$NEW_HASH" == "$OLD_HASH" ]; then
          echo "No changes detected in bundled artifacts — skipping release."
          echo "changed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "$NEW_HASH" > "$HASH_FILE"
        echo "changed=true" >> "$GITHUB_OUTPUT"

        ZIP_PATH="LostMinions.Packages.zip"
        echo "Zipping to $ZIP_PATH"
        (cd "$OUTPUT_DIR" && zip -r "../$ZIP_PATH" .)
        echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

    # ------------------------------------------------------------
    # 💾 Save updated hash to cache (only when changed)
    # ------------------------------------------------------------
    - name: 💾 Save new bundle hash
      if: steps.bundle.outputs.changed == 'true'
      uses: actions/cache@v4
      with:
        path: .bundle-hash
        key: bundle-hash-${{ github.ref_name }}

    # ------------------------------------------------------------
    # 🔢 Determine version (only when changed)
    # ------------------------------------------------------------
    - name: 🔢 Determine Version
      id: version
      if: steps.bundle.outputs.changed == 'true'
      uses: ./.github/actions/bump-version
      with:
        bump: ${{ inputs.bump }}

    # ------------------------------------------------------------
    # 🏷️ Tag & Publish Release (only when changed)
    # ------------------------------------------------------------
    - name: 🏷️ Tag & Publish Release
      if: steps.bundle.outputs.changed == 'true'
      uses: ./.github/actions/publish-github-release
      with:
        version: ${{ steps.version.outputs.version }}
        gh-token: ${{ inputs.gh-token }}
        files: ${{ steps.bundle.outputs.zip_path }}
        title: "📦 LostMinions.Packages"
        keep-latest: 25
