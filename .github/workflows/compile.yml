name: 🧪 Compile

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/compile.yml"
  workflow_call:
  workflow_dispatch:

jobs:
  compile:
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Validate GH_TOKEN
        shell: bash
        run: |
          echo "Validating GitHub token..."
          if curl -s -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" https://api.github.com/user | grep -q '"login"'; then
            echo "✅ Token OK"
          else
            echo "❌ Bad or expired GH_TOKEN"; exit 1
          fi

      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🧰 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔍 Detect solution
        id: solution
        shell: bash
        run: |
          SOLUTION=$(find . -maxdepth 1 -name "*.sln" | head -n 1)
          if [ -z "$SOLUTION" ]; then
            echo "❌ No solution found."; exit 1
          fi
          echo "SOLUTION=$SOLUTION" >> $GITHUB_ENV
          echo "🔍 Found solution: $SOLUTION"

      - name: 🔐 Configure NuGet for GitHub Packages
        shell: bash
        run: |
          echo "🔐 Configuring NuGet source..."
          FEED_URL="https://nuget.pkg.github.com/LostMinions/index.json"
          dotnet nuget remove source github --force >/dev/null 2>&1 || true
          dotnet nuget add source "$FEED_URL" \
            --name "github" \
            --username "TheKrush" \
            --password "${{ secrets.GH_TOKEN }}" \
            --store-password-in-clear-text
          echo "✅ NuGet source configured: $FEED_URL"

      - name: 🧱 Restore dependencies
        shell: bash
        run: dotnet restore "$SOLUTION"

      - name: 🏗️ Build solution
        shell: bash
        run: dotnet build "$SOLUTION" -c Release --no-restore --nologo --verbosity minimal

      - name: ✅ Verify Build Success
        shell: bash
        run: echo "✅ $(basename "$SOLUTION") compiled successfully."
