name: 🧪 Compile

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/compile.yml"
  workflow_call:
    inputs:
      project_filter:
        description: "File pattern for project or solution to build"
        required: false
        default: "*.sln"
        type: string
  workflow_dispatch:
    inputs:
      project_filter:
        description: "File pattern for project or solution to build"
        required: false
        default: "*.sln"
        type: string

jobs:
  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    name: 🧮 Precheck
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: self-hosted
    timeout-minutes: 1
    continue-on-error: true
    outputs:
      over_limit: ${{ steps.usage.outputs.over_limit || 'false' }}

    steps:
      - name: 🏁 Identify Runner
        run: |
          echo "Running Org Sync on $(hostname) (${RUNNER_OS})"

      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: ⚙️ Validate GH_TOKEN
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}
          check-actions: "true"
          check-packages-bandwidth: "false"

      - name: 📊 Summary
        run: echo "Precheck complete (over_limit=${{ steps.usage.outputs.over_limit }})"

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner

  # ----------------------------------------
  # 🏗️ Compile
  # ----------------------------------------
  compile:
    name: ${{ format('🏗️ Compile {0}', needs.precheck.outputs.over_limit == 'true' && '(Self-Hosted)' || '(GitHub)') }}
    needs: precheck
    runs-on: ${{ needs.precheck.outputs.over_limit == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5

    steps:
      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: ⚙️ Setup .NET and NuGet
        uses: ./.github/actions/setup-dotnet-nuget
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          owner: ${{ github.repository_owner }}

      - name: 🧱 Build .NET Project
        id: build
        uses: ./.github/actions/build-dotnet
        with:
          project_filter: ${{ inputs.project_filter }}
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: ✅ Verify Build Success
        shell: bash
        run: echo "✅ Build completed successfully."

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner
