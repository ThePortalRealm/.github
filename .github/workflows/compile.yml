name: 🧪 Compile

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/compile.yml"
  workflow_call:
  workflow_dispatch:

jobs:
  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      over_limit: ${{ steps.usage.outputs.over_limit }}

    steps:
      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: ⚙️ Validate GH_TOKEN
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          check-actions: "true"
          check-packages-bandwidth: "true"

      - name: 📊 Summary
        run: echo "✅ Precheck complete (over_limit=${{ steps.usage.outputs.over_limit }})"

  # ----------------------------------------
  # 🏗️ Compile
  # ----------------------------------------
  compile:
    needs: precheck
    if: ${{ needs.precheck.outputs.over_limit != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: ⚙️ Setup .NET and NuGet
        uses: ./.github/actions/setup-dotnet-nuget
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          owner: ${{ github.repository_owner }}

      - name: 🧱 Build .NET Project
        id: build
        uses: ./.github/actions/build-dotnet

      - name: ✅ Verify Build Success
        shell: bash
        run: echo "✅ Build completed successfully."

  # ----------------------------------------
  # 🚫 Skipped (if over usage limit)
  # ----------------------------------------
  skipped:
    needs: precheck
    if: ${{ needs.precheck.outputs.over_limit == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "⚠️ Skipped build — org usage near or over limit."
