name: 🔄 GitHub Org Sync

on:
  workflow_dispatch:
    inputs:
      max_jobs:
        description: "Maximum concurrent repos to sync"
        required: false
        default: "4"
  push:
    branches: [ main, master ]
    paths:
      # --- Workflow files
      - ".github/workflows/org-sync.yml"

      # --- Source sync files
      - "admin/*.sh"
      - "admin/*.json"

      # --- Template folders to watch
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/workflows/**"

      # --- Governance documents
      - "CONTRIBUTING.md"
#      - "LICENSE"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Validate GH_TOKEN
        shell: pwsh
        run: |
          try {
            $r = Invoke-RestMethod https://api.github.com/user -Headers @{Authorization="Bearer ${{secrets.GH_TOKEN}}"} -ErrorAction Stop
            if (-not $r.login) { throw "Invalid" }
            Write-Host "✅ Token OK: $($r.login)"
          } catch {
            Write-Host "❌ Bad or expired GH_TOKEN"
            exit 1
          }

      - name: ⚙️ Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: ⚙️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git gh jq perl
          echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token
          gh auth status -t

      - name: 🔮 Run Org Sync
        shell: bash
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MAX_JOBS: ${{ github.event.inputs.max_jobs || 4 }}
        run: |
          cd admin
          set -o pipefail
          find . -type f -name "*.sh" -exec sed -i 's/\r$//' {} \;
          chmod +x *.sh
          start=$(date +%s)
          bash sync-core.sh | tee ../sync-output.txt
          end=$(date +%s)
          echo "⏱️ Sync duration: $(( (end - start) / 60 )) minutes"

      - name: 📦 Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sync-logs
          path: admin/logs/
          retention-days: 30

      - name: 📄 Show Summary
        if: always()
        run: |
          echo "### Sync Completed $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          shopt -s nullglob
          for log in admin/logs/*.log; do
            repo=$(basename "$log" .log)
            if grep -iq "failed" "$log"; then
              echo "| $repo | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $repo | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          shopt -u nullglob
