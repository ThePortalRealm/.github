name: 🔄 GitHub Org Sync

on:
  push:
    branches: [ main, master ]
    paths:
      # --- Workflow files
      - ".github/workflows/org-sync.yml"

      # --- Template folders to watch
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".github/actions/**"
      - ".github/scripts/**"
      - ".github/workflows/**"

      # --- Source sync files
      - "admin/*.sh"
      - "admin/*.json"
      - "tools/*"

      # --- Governance documents
      - "CONTRIBUTING.md"
      # - "LICENSE"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"

  workflow_call:
    inputs:
      max_jobs:
        description: "Maximum concurrent repos to sync"
        required: false
        default: 4
        type: number

  workflow_dispatch:
    inputs:
      max_jobs:
        description: "Maximum concurrent repos to sync"
        required: false
        default: 4
        type: number

jobs:
  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    name: 🧮 Precheck
    runs-on: self-hosted
    timeout-minutes: 1
    continue-on-error: true
    outputs:
      over_limit: ${{ steps.usage.outputs.over_limit || 'false' }}

    steps:
      - name: 🏁 Identify Runner
        run: |
          echo "Running Org Sync on $(hostname) (${RUNNER_OS})"

      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: ⚙️ Validate GH_TOKEN
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}
          check-actions: "true"
          check-packages-bandwidth: "false"

      - name: 📊 Summary
        run: echo "Precheck complete (over_limit=${{ steps.usage.outputs.over_limit }})"

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner

  # ----------------------------------------
  # 🧠 Org Sync
  # ----------------------------------------
  org-sync:
    name: ${{ format('🧠 Org Sync {0}', needs.precheck.outputs.over_limit == 'true' && '(Self-Hosted)' || '(GitHub)') }}
    needs: precheck
    runs-on: ${{ needs.precheck.outputs.over_limit == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - name: 🏁 Identify Runner
        env:
          SELF_HOSTED: ${{ needs.precheck.outputs.over_limit }}
        run: |
          echo "Running Org Sync on $(hostname) (${RUNNER_OS})"
          echo "Self Hosted: $SELF_HOSTED"

      - name: 🧰 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: ⚙️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git gh jq perl
          echo "${{ secrets.GH_TOKEN }}" | gh auth login --with-token
          gh auth status -t

      - name: 🔮 Run Org Sync
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MAX_JOBS: ${{ github.event.inputs.max_jobs || 4 }}
        run: |
          cd admin
          set -o pipefail
          find . -type f -name "*.sh" -exec sed -i 's/\r$//' {} \;
          chmod +x *.sh
          start=$(date +%s)
          bash sync-core.sh | tee ../sync-output.txt
          end=$(date +%s)
          echo "⏱️ Sync duration: $(( (end - start) / 60 )) minutes"

      - name: 📦 Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sync-logs
          path: admin/logs/
          retention-days: 30

      - name: 📄 Show Summary
        if: always()
        shell: bash
        run: |
          echo "### Sync Completed $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          shopt -s nullglob
          for log in admin/logs/*.log; do
            repo=$(basename "$log" .log)
            if grep -iq "failed" "$log"; then
              echo "| $repo | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $repo | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          shopt -u nullglob

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner
