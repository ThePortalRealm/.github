name: 📦 Publish .NET Package

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/publish.yml"
  workflow_call:
    inputs:
      bump:
        description: "Version bump type (major, minor, patch)"
        required: false
        default: "patch"
        type: string
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (major, minor, patch)"
        required: false
        default: "patch"
        type: string

permissions:
  contents: write
  packages: write

jobs:  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    name: 🧮 Precheck
    if: ${{ !endsWith(github.repository, '/.github') }}
    # Org repos → self-hosted, user repos → github-hosted
    runs-on: ${{ github.event.repository.owner.type == 'Organization' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 3
    continue-on-error: true
    outputs:
      # usage.over_limit (org) OR assume-ok.over_limit (user) OR default false
      over_limit: ${{ steps.usage.outputs.over_limit || steps.assume_ok.outputs.over_limit || 'false' }}

    steps:
      - name: 🔎 Owner info (debug)
        run: |
          echo "Repository:       ${{ github.repository }}"
          echo "Owner:            ${{ github.repository_owner }}"
          echo "Owner type:       ${{ github.event.repository.owner.type }}"
          echo "Runner:           $RUNNER_NAME"
          echo "Runner OS:        $RUNNER_OS"

      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      # Only needed (and only valid) for org repos
      - name: ⚙️ Validate GH_TOKEN
        if: ${{ github.event.repository.owner.type == 'Organization' }}
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage (org only)
        id: usage
        if: ${{ github.event.repository.owner.type == 'Organization' }}
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}
          check-actions: "true"
          check-packages-bandwidth: "false"

      # For user repos, we don't care about org minutes at all:
      # just declare over_limit=false and move on.
      - name: ✅ Assume under limit (user repos)
        id: assume_ok
        if: ${{ github.event.repository.owner.type != 'Organization' }}
        run: |
          echo "This is a user-owned repo; skipping org usage checks."
          echo "over_limit=false" >> "$GITHUB_OUTPUT"

      - name: 📊 Summary
        run: |
          echo "Precheck complete."
          echo "Owner type: ${{ github.event.repository.owner.type }}"
          echo "over_limit = ${{ steps.usage.outputs.over_limit || steps.assume_ok.outputs.over_limit || 'false' }}"

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner

  # ----------------------------------------
  # 🚀 Publish Package
  # ----------------------------------------
  publish:
    name: ${{ format('🚀 Publish Package {0}', needs.precheck.outputs.over_limit == 'true' && '(Self-Hosted)' || '(GitHub)') }}
    needs: precheck
    runs-on: ${{ needs.precheck.outputs.over_limit == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5

    steps:
      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🔍 Resolve .NET project to publish
        id: resolve_project
        shell: bash
        run: |
          # 1) Config override: .github/dotnet-publish-project.txt
          if [ -f ".github/dotnet-publish-project.txt" ]; then
            echo "Found .github/dotnet-publish-project.txt, using that."
            project=$(<.github/dotnet-publish-project.txt)

            # Trim whitespace
            project="$(echo "$project" | tr -d '\r' | xargs)"

            if [ -z "$project" ]; then
              echo "❌ .github/dotnet-publish-project.txt is empty."
              exit 1
            fi

            if [ ! -f "$project" ]; then
              echo "❌ Project from .github/dotnet-publish-project.txt does not exist: $project"
              exit 1
            fi

            echo "project_filter=$project" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No .github/dotnet-publish-project.txt found. Auto-detecting project..."

          # 2) Auto-detect: all .csproj files, excluding test projects
          mapfile -t all < <(find . -name '*.csproj' -print | sort || true)

          if [ "${#all[@]}" -eq 0 ]; then
            echo "❌ No .csproj files found in repo."
            exit 1
          fi

          echo "Found ${#all[@]} .csproj file(s):"
          printf '  %s\n' "${all[@]}"

          non_test=()
          for p in "${all[@]}"; do
            filename=$(basename "$p")
            if [[ "$filename" == *.Tests.csproj ]]; then
              echo "Skipping test project: $p"
              continue
            fi
            non_test+=("$p")
          done

          if [ "${#non_test[@]}" -eq 0 ]; then
            echo "❌ All .csproj files look like test projects (*.Tests.csproj)."
            echo "   Add .github/dotnet-publish-project.txt to specify the main project."
            exit 1
          fi

          if [ "${#non_test[@]}" -gt 1 ]; then
            echo "❌ Multiple non-test .csproj files detected:"
            printf '  %s\n' "${non_test[@]}"
            echo "   Add .github/dotnet-publish-project.txt to specify the main project."
            exit 1
          fi

          project="${non_test[0]}"
          echo "Using detected project: $project"
          echo "project_filter=$project" >> "$GITHUB_OUTPUT"

      - name: 📦 Publish .NET Package
        uses: ./.github/actions/publish-dotnet-package
        with:
          project_filter: ${{ steps.resolve_project.outputs.project_filter }}
          bump: ${{ github.event.inputs.bump }}
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner
