name: 📦 Publish Package

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (major, minor, patch)'
        required: false
        default: 'patch'
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/publish.yml"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      # 🔁 Shared setup identical to compile-test
      - name: 🔑 Validate GH_TOKEN
        shell: bash
        run: |
          echo "Validating GitHub token..."
          if curl -s -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" https://api.github.com/user | grep -q '"login"'; then
            echo "✅ Token OK"
          else
            echo "❌ Bad or expired GH_TOKEN"; exit 1
          fi

      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🧰 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔐 Configure NuGet for GitHub Packages
        shell: bash
        run: |
          echo "🔐 Configuring NuGet source..."

          # Always use LostMinions feed for shared libraries
          FEED_URL="https://nuget.pkg.github.com/LostMinions/index.json"

          if [ "${{ github.repository_owner }}" != "LostMinions" ]; then
            echo "📦 External repository detected — using LostMinions feed for shared libraries."
          else
            echo "📦 Repository belongs to LostMinions — using local org feed."
          fi

          # Clean up any existing source
          dotnet nuget remove source github --force >/dev/null 2>&1 || true

          # Add the fixed feed URL
          dotnet nuget add source "$FEED_URL" \
            --name "github" \
            --username "TheKrush" \
            --password "${{ secrets.GH_TOKEN }}" \
            --store-password-in-clear-text

          echo "✅ NuGet source configured: $FEED_URL"

      # 🔍 Detect project + version bump
      - name: Detect project
        id: detect
        run: |
          PROJECT=$(find . -maxdepth 1 -name "*.csproj" | head -n 1)
          [ -z "$PROJECT" ] && echo "❌ No .csproj file found" && exit 1
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "📦 Project: $PROJECT"

      - name: Determine next version
        id: version
        run: |
          git fetch --tags --quiet
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          BASE=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "${{ github.event.inputs.bump }}" in
            major) ((MAJOR++)); MINOR=0; PATCH=0 ;;
            minor) ((MINOR++)); PATCH=0 ;;
            *) ((PATCH++)) ;;
          esac
          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🔢 Version: $VERSION"

      # 🔨 Build + pack + push
      - run: dotnet restore ${{ steps.detect.outputs.project }}
      - run: dotnet build ${{ steps.detect.outputs.project }} -c Release --no-restore
      - run: |
          cd $(dirname "${{ steps.detect.outputs.project }}")
          dotnet pack $(basename "${{ steps.detect.outputs.project }}") -c Release --no-restore --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }} -p:IncludeSymbols=true -p:IncludeSource=true
      - run: |
          dotnet nuget push "bin/Release/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GH_TOKEN }} --skip-duplicate

      # 🏷️ Tag + release
      - run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "📦 ${{ github.event.repository.name }} ${{ steps.version.outputs.version }}"
          files: bin/Release/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
