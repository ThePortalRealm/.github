name: 🔄 Update Submodules

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/update-submodules.yml"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    name: 🧮 Precheck
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: self-hosted
    timeout-minutes: 1
    continue-on-error: true
    outputs:
      over_limit: ${{ steps.usage.outputs.over_limit || 'false' }}

    steps:
      - name: 🏁 Identify Runner
        run: |
          echo "Running Org Sync on $(hostname) (${RUNNER_OS})"

      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: ⚙️ Validate GH_TOKEN
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}
          check-actions: "true"
          check-packages-bandwidth: "false"

      - name: 📊 Summary
        run: echo "Precheck complete (over_limit=${{ steps.usage.outputs.over_limit }})"

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner

  # ----------------------------------------
  # 🔄 Update Submodules
  # ----------------------------------------
  submodule-update:
    name: ${{ format('🔄 Update Submodules {0}', needs.precheck.outputs.over_limit == 'true' && '(Self-Hosted)' || '(GitHub)') }}
    needs: precheck
    runs-on: ${{ needs.precheck.outputs.over_limit == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    outputs:
      updated: ${{ steps.update_submodules.outputs.updated }}

    steps:
      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🔄 Update All Submodules
        id: update_submodules
        shell: bash
        run: |
          echo "🔄 Resetting and updating all submodules..."
          git submodule foreach --recursive 'git reset --hard'
          git submodule foreach --recursive 'git checkout master || true'
          git submodule foreach --recursive 'git pull origin master || true'

          echo "🧩 Committing updated submodules..."
          git add .
          if git diff --cached --quiet; then
            echo "✅ No changes to commit."
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🔄 Update submodules to latest ($NOW)"
            echo "⬆️ Pushing changes..."
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin HEAD:"${{ github.ref_name }}"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner
