name: 🔄 Update Submodules

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/update-submodules.yml"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    name: 🧮 Precheck (Usage & Token)
    if: ${{ !endsWith(github.repository, '/.github') }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      over_limit: ${{ steps.usage.outputs.over_limit }}

    steps:
      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      - name: ⚙️ Validate GH_TOKEN
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage
        id: usage
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          check-actions: "true"
          check-packages-bandwidth: "false"

      - name: 📊 Summary
        run: echo "✅ Precheck complete (over_limit=${{ steps.usage.outputs.over_limit }})"

  # ----------------------------------------
  # 🔄 Update Submodules
  # ----------------------------------------
  submodule-update:
    name: 🔄 Update Submodules
    needs: precheck
    if: ${{ needs.precheck.outputs.over_limit != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      updated: ${{ steps.update_submodules.outputs.updated }}

    steps:
      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🔄 Update All Submodules
        id: update_submodules
        shell: bash
        run: |
          echo "🔄 Resetting and updating all submodules..."
          git submodule foreach --recursive 'git reset --hard'
          git submodule foreach --recursive 'git checkout master || true'
          git submodule foreach --recursive 'git pull origin master || true'

          echo "🧩 Committing updated submodules..."
          git add .
          if git diff --cached --quiet; then
            echo "✅ No changes to commit."
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🔄 Update submodules to latest ($NOW)"
            echo "⬆️ Pushing changes..."
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin HEAD:"${{ github.ref_name }}"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------
  # 🚀 Trigger Compile Workflow (if updated)
  # ----------------------------------------
  trigger-compile:
    needs: submodule-update
    if: ${{ needs.submodule-update.outputs.updated == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Trigger Compile Workflow
        uses: peter-evans/workflow-dispatch@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ github.repository }}
          workflow: "compile.yml"
          ref: ${{ github.ref_name }}

  # ----------------------------------------
  # 🚫 Skipped (if over usage limit)
  # ----------------------------------------
  skipped:
    name: 🚫 Skipped (Usage Limit)
    needs: precheck
    if: ${{ needs.precheck.outputs.over_limit == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "⚠️ Skipped submodule update — org usage near or over limit."
