name: 🔁 Update Submodules - Weekly

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/update-submodules-weekly.yml"
  schedule:
    - cron: "0 3 * * 0"   # Sundays 03:00 UTC

jobs:
  trigger-update:
    if: ${{ !endsWith(github.repository, '/.github') }}
    timeout-minutes: 5
    name: Trigger Update Submodules
    runs-on: ubuntu-latest
    steps:
      - name: 📨 Dispatch update-submodules.yml
        run: |
          echo "🔁 Triggering update-submodules.yml..."
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-submodules.yml/dispatches \
            -d '{"ref": "${{ github.ref_name }}"}'
