name: 🧩 Attach Lavalink Runtime to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    name: 🧮 Precheck
    if: ${{ !endsWith(github.repository, '/.github') }}
    # Org repos → self-hosted, user repos → github-hosted
    runs-on: ${{ github.event.repository.owner.type == 'Organization' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 3
    continue-on-error: true
    outputs:
      # usage.over_limit (org) OR assume-ok.over_limit (user) OR default false
      over_limit: ${{ steps.usage.outputs.over_limit || steps.assume_ok.outputs.over_limit || 'false' }}

    steps:
      - name: 🔎 Owner info (debug)
        run: |
          echo "Repository:       ${{ github.repository }}"
          echo "Owner:            ${{ github.repository_owner }}"
          echo "Owner type:       ${{ github.event.repository.owner.type }}"
          echo "Runner:           $RUNNER_NAME"
          echo "Runner OS:        $RUNNER_OS"

      - name: 🧾 Minimal Checkout for Local Actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts
          fetch-depth: 1

      # Only needed (and only valid) for org repos
      - name: ⚙️ Validate GH_TOKEN
        if: ${{ github.event.repository.owner.type == 'Organization' }}
        uses: ./.github/actions/validate-gh-token
        with:
          gh-token: ${{ secrets.GH_TOKEN }}

      - name: 🧮 Check GitHub Usage (org only)
        id: usage
        if: ${{ github.event.repository.owner.type == 'Organization' }}
        uses: ./.github/actions/check-org-usage
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          org-name: ${{ github.repository_owner }}
          check-actions: "true"
          check-packages-bandwidth: "false"

      # For user repos, we don't care about org minutes at all:
      # just declare over_limit=false and move on.
      - name: ✅ Assume under limit (user repos)
        id: assume_ok
        if: ${{ github.event.repository.owner.type != 'Organization' }}
        run: |
          echo "This is a user-owned repo; skipping org usage checks."
          echo "over_limit=false" >> "$GITHUB_OUTPUT"

      - name: 📊 Summary
        run: |
          echo "Precheck complete."
          echo "Owner type: ${{ github.event.repository.owner.type }}"
          echo "over_limit = ${{ steps.usage.outputs.over_limit || steps.assume_ok.outputs.over_limit || 'false' }}"

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner

  # ----------------------------------------
  # 🧩 Lavalink Attachment
  # ----------------------------------------
  attach-lavalink:
    name: ${{ format('🧩 Attach Lavalink {0}', needs.precheck.outputs.over_limit == 'true' && '(Self-Hosted)' || '(GitHub)') }}
    needs: precheck
    runs-on: ${{ needs.precheck.outputs.over_limit == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 3

    steps:
      - name: ⚙️ Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 📦 Zip Lavalink runtime
        if: ${{ hashFiles('Lavalink/Lavalink.jar') != '' }}
        shell: pwsh
        run: |
          Write-Host "Creating Lavalink.zip..."
          Compress-Archive -Path 'Lavalink/*' -DestinationPath 'Lavalink.zip' -Force

      - name: 🔍 Check if Lavalink.zip already exists in release
        id: check_asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh release view "${{ github.event.release.tag_name }}" --repo ${{ github.repository }} --json assets --jq ".assets[].name" | grep -Fx "Lavalink.zip" || true)
          if [ -n "$existing" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Lavalink.zip already attached to release. Skipping upload."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Lavalink.zip not found, proceeding with upload."
          fi

      - name: 📤 Attach Lavalink.zip to existing release
        if: steps.check_asset.outputs.exists == 'false' && ${{ hashFiles('Lavalink/Lavalink.jar') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" Lavalink.zip --repo ${{ github.repository }} --clobber
          echo "✅ Lavalink.zip successfully uploaded."

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner
