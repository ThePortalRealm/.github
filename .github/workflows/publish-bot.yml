name: 🤖 Publish Discord Bot Build

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (major, minor, patch)'
        required: false
        default: 'patch'

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ !endsWith(github.repository, '/.github') }}

    runs-on: windows-latest

    steps:
      - name: 🔑 Validate GH_TOKEN
        shell: pwsh
        run: |
          try {
            $r = Invoke-RestMethod https://api.github.com/user -Headers @{Authorization="Bearer ${{secrets.GH_TOKEN}}"} -ErrorAction Stop
            if (-not $r.login) { throw "Invalid" }
            Write-Host "✅ Token OK: $($r.login)"
          } catch {
            Write-Host "❌ Bad or expired GH_TOKEN"
            exit 1
          }

      - name: ⚙️ Configure Git
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store

          $gitCreds = if ($IsWindows) {
            Join-Path $env:USERPROFILE ".git-credentials"
          } else {
            Join-Path $env:HOME ".git-credentials"
          }

          "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" | Out-File -FilePath $gitCreds -Encoding ascii
          Write-Host "✅ Git credentials stored at $gitCreds"

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: 🧰 Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔐 Configure NuGet for GitHub Packages
        shell: pwsh
        run: |
          Write-Host "Adding GitHub Packages source for LostMinions..."
          dotnet nuget remove source github -v q -f | Out-Null
          dotnet nuget add source "https://nuget.pkg.github.com/LostMinions/index.json" `
            --name "github" `
            --username "TheKrush" `
            --password "${{ secrets.GH_TOKEN }}" `
            --store-password-in-clear-text | Out-Null
          Write-Host "✅ NuGet source added: https://nuget.pkg.github.com/LostMinions/"

      - name: 🔍 Detect Bot Project
        id: detect
        shell: pwsh
        run: |
          $botProject = Get-ChildItem -Path . -Recurse -Filter "*Bot.csproj" | Select-Object -First 1
          if (-not $botProject) {
            Write-Host "❌ No Bot project (*.Bot.csproj) found!"
            exit 1
          }
          Write-Host "🤖 Found bot project: $($botProject.FullName)"
          echo "bot_project=$($botProject.FullName)" >> $env:GITHUB_OUTPUT

      - name: 🔢 Determine next version automatically
        id: version
        shell: bash
        run: |
          git fetch --tags --quiet
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag: $LATEST_TAG"

          if [ -z "$LATEST_TAG" ]; then
            MAJOR=1; MINOR=0; PATCH=0
          else
            BASE_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d'.' -f1-3)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          fi

          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          echo "Bump type: $BUMP_TYPE"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
            *)
              echo "❌ Unknown bump type: $BUMP_TYPE"; exit 1 ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "🔢 Using version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 🧱 Restore dependencies
        shell: pwsh
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          Write-Host "🔍 Restoring packages for ${{ steps.detect.outputs.bot_project }} ..."
          dotnet restore "${{ steps.detect.outputs.bot_project }}" --verbosity minimal

      - name: 🏗️ Build bot
        run: dotnet build "${{ steps.detect.outputs.bot_project }}" -c Release --no-restore

      - name: 🧱 Publish bot (self-contained)
        id: publish
        shell: pwsh
        run: |
          $output = Join-Path (Get-Location) "publish"
          Write-Host "🚀 Publishing bot to: $output"
          dotnet publish "${{ steps.detect.outputs.bot_project }}" -c Release -o $output --no-restore
          echo "output=$output" >> $env:GITHUB_OUTPUT

      - name: 📦 Zip published output
        id: zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipPath = "bot-release-$version.zip"
          $publishDir = "${{ steps.publish.outputs.output }}"
          Write-Host "📦 Zipping contents of $publishDir to $zipPath"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath
          echo "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          Write-Host "✅ Created archive: $zipPath"

      - name: 🏷️ Create Git Tag
        id: tag
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          git tag -a $tag -m "Bot release $tag"
          git push origin $tag
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "🤖 Bot Release ${{ steps.tag.outputs.tag }}"
          body: |
            **Repository:** ${{ github.repository }}
            **Version:** ${{ steps.version.outputs.version }}
            **Published by:** ${{ github.actor }}
          files: |
            ${{ steps.zip.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
