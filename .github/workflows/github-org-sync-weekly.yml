name: 🔄 GitHub Org Sync - Weekly

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/github-org-sync-weekly.yml"
  schedule:
    - cron: "0 8 * * 0"   # Sundays 08:00 UTC

jobs:
  trigger:
    # ✅ Only run for org-owned .github repos
    if: ${{ github.event.repository.owner.type == 'Organization' && endsWith(github.repository, '/.github') }}
    name: ⏰
    uses: ./.github/workflows/github-org-sync.yml
    secrets: inherit
