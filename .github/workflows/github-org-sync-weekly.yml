name: 🔄 GitHub Org Sync - Weekly

on:
  schedule:
    - cron: "0 1 * * 0"   # Sundays 01:00 UTC
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/github-org-sync-weekly.yml"

jobs:
  trigger-update:
    name: Trigger Submodule Update
    runs-on: ubuntu-latest
    steps:
      - name: 📨 Dispatch update-submodules.yml
        run: |
          echo "🔁 Triggering github-org-sync.yml..."
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/github-org-sync.yml/dispatches \
            -d '{"ref": "${{ github.ref_name }}"}'
